name: "Update flux image and deploy on kube"
description: "This action will update docker image id and deploy in on K8s"

inputs:
  cluster:
    description: "cluster to deploy"
    required: false
    default: "truestory"
  kubeconfig:
    description: "path to kubeconfig"
    required: false
    default: "~/.kube/kubeconfig"
  manifest:
    description: "path to manifest file"
    required: true
  image_tag:
    description: "Image tag to deploy"
    required: false
  token:
    description: "token to access private repos"
    required: false

runs:
  using: "composite"
  steps:
    - name: prepare
      shell: bash
      run: |
        ls -la 
        ls -la /tmp/.ssh
        echo "ID_RSA<<EOF"    >> $GITHUB_ENV
        cat /tmp/.ssh/id_rsa  >> $GITHUB_ENV 
        echo "EOF"            >> $GITHUB_ENV
        rm -rf ./flux
        if [ "${{ inputs.image_tag }}" != "" ]; then
          echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_ENV
        elif [ "${{ github.ref }}" == "refs/tags/" ]; then
          echo "image_tag=${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "image_tag=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        fi

    - name: flux
      shell: bash
      run: |
        - export GIT_SSH_COMMAND='ssh -i /tmp/.ssh/id_rsa -o IdentitiesOnly=yes'
        - export GIT_PAGER='cat'
        - git clone git@github.com:theverytruestory/flux.git flux && cd flux
        - sed -i '1,/image:.*/{s/\(image:[^:]*\):.*/\1:${{ env.image_tag }}/;}' ${{ inputs.manifest }}
        - git diff -U0 --color=always || true
        - git config user.name "GitHub Automation"
        - git config user.email "GitHubActions@thetruestory.news"
        - git add ${{ inputs.manifest }}
        - git commit -a -m "from ${{ github.event.repository.name }} at ${{ inputs.image_tag }} (${{ env.branch }})"
        - git push

