name: "Docker build and upload to registry"
description: "This will build docker image and upload it to registry"

inputs:
  docker_file:
    description: "Path to dockerfile"
    required: false
    default: "./Dockerfile"
  context:
    description: "Docker context"
    required: false
    default: "."
  registry:
    description: "Docker registry"
    required: false
    default: "registry.truestory.work"
  tag:
    description: "Image tag, if not set it will be generated from branch name and commit hash"
    required: false
    default: ""
  repo:
    description: "Repository name, if not set it will be taken from github event"
    required: false
    default: ""
  version_file:
    description: "File with version information, if not set it will be created from git log, use '' empty string to disable"
    required: false
    default: "version.json"
  builder_image:
    description: "Builder image to use as base (for multi-stage builds). If image doesn't exist, it will be built automatically."
    required: false
    default: ""
  builder_dockerfile:
    description: "Path to builder dockerfile (used if builder needs to be built)"
    required: false
    default: "./Dockerfile.builder"

outputs:
  REPO:
    description: "Image url"
    value: ${{ steps.output.outputs.REPO }}
  TAG:
    description: "Image tag"
    value: ${{ steps.output.outputs.TAG }}

runs:
  using: "composite"
  steps:

    - name: Set vars
      shell: bash
      env:
        BRANCH: ${{ github.head_ref || github.ref_name }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_TAG: ${{ inputs.tag }}
        REF_TYPE: ${{ github.ref_type }}
      run: |
        if [ -n "$INPUT_TAG" ]; then
          TAG="$INPUT_TAG"
        elif [ "$REF_TYPE" = "tag" ]; then
          TAG_DATE=$(TZ=UTC git log -1 --format=%cd --date=format:'%Y-%m-%d' ${{ github.ref_name }})
          TAG="${{ github.ref_name }}-${TAG_DATE}"
        else
          BRANCH_CLEAN=$(echo "${BRANCH#refs/heads/}" | sed 's/\//-/g')
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(TZ=UTC git log -1 --format=%cd --date=format:'%Y-%m-%d')
          TAG="${BRANCH_CLEAN}-${SHORT_SHA}-${COMMIT_DATE}"
        fi

        if [ -n "$INPUT_REPO" ]; then
          REPO_NAME="$INPUT_REPO"
        else
          REPO_NAME="${{ github.event.repository.name }}"
        fi

        REPO="${{ inputs.registry }}/${REPO_NAME}"

        echo "TAG=${TAG}" >> $GITHUB_ENV
        echo "REPO=${REPO}" >> $GITHUB_ENV
        echo "Generated TAG: ${TAG}"
        echo "Generated REPO: ${REPO}"


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config-inline: |
          [registry."${{ inputs.registry }}"]
            ca=["/usr/local/share/ca-certificates/ttf-root-ca.crt"]

    - name: Check if builder image exists
      if: ${{ inputs.builder_image != '' }}
      id: check-builder
      shell: bash
      continue-on-error: true
      run: |
        if docker manifest inspect ${{ inputs.builder_image }} >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Builder image exists: ${{ inputs.builder_image }}"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Builder image does not exist: ${{ inputs.builder_image }}"
        fi

    - name: Build builder image
      if: ${{ inputs.builder_image != '' && steps.check-builder.outputs.exists != 'true' }}
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
        DOCKER_BUILD_SUMMARY: false
      with:
        push: true
        context: ${{ inputs.context }}
        file: ${{ inputs.builder_dockerfile }}
        tags: ${{ inputs.builder_image }}
        cache-from: type=registry,ref=${{ env.REPO }}:builder-cache
        cache-to: type=registry,ref=${{ env.REPO }}:builder-cache,mode=max

    - name: create ${{ inputs.version_file }}
      if: ${{ inputs.version_file != '' }}
      shell: bash
      run: git log -1 --pretty="${fmt}" | tee  ${{ inputs.version_file }}
      env:
        fmt: 'tformat:{%n"git commit": "%H",%n"git hash": "%h",%n"git author": "%an %ae",%n"git date": "%ai",%n"git subject": "%s",%n"git branch": "%D"%n}'

    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
        DOCKER_BUILD_SUMMARY: false
      with:
        push: true
        context: ${{ inputs.context }}
        file: ${{ inputs.docker_file }}
        tags: ${{ env.REPO }}:${{ env.TAG }}
        cache-from: type=registry,ref=${{ env.REPO }}:buildcache
        cache-to: type=registry,ref=${{ env.REPO }}:buildcache,mode=max
        build-args: |
          BUILDER_IMAGE=${{ inputs.builder_image }}

    - name: set outputs
      id: output
      env:
        REPO: ${{ env.REPO }}
        TAG: ${{ env.TAG }}
      shell: bash
      run: |
        echo "REPO=$REPO" >> $GITHUB_OUTPUT
        echo "TAG=$TAG" >> $GITHUB_OUTPUT
        echo "image: ${{ env.REPO }}:${{ env.TAG }}" >> $GITHUB_STEP_SUMMARY
        echo '<details><summary>details</summary>' >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        jq . ${{ inputs.version_file }} || cat ${{ inputs.version_file }} >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo '</details>' >> $GITHUB_STEP_SUMMARY
