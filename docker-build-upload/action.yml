name: "Docker build and upload to ECR"
description: "This will build docker image and upload it to ECR"
inputs:
  docker_file:
    description: "Path to dockerfile"
    required: false
    default: "./Dockerfile"


outputs:
  ecr_uri:
    description: "Image link"
    value: ${{ steps.docker-build.outputs.image_link }}

runs:
  using: "composite"
  steps:

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: eu-north-1
        
    - name: Get or create ECR repository
      shell: bash
      run: >
        aws ecr describe-repositories --repository-names ${{ github.event.repository.name }}
        --query "repositories[0].repositoryUri" || aws ecr create-repository --repository-name ${{ github.event.repository.name }}

    - name: Get variables
      shell: bash
      run: |
        image_tag=$(git rev-parse --short HEAD) && echo "image_tag=${image_tag}" >> $GITHUB_ENV
        ecr=648358337825.dkr.ecr.eu-north-1.amazonaws.com && echo "ecr=${ecr}" >> $GITHUB_ENV
        echo "image_url=${ecr}/${{ github.event.repository.name }}:${image_tag}" >> $GITHUB_ENV
        echo "ecr_password=$(aws ecr get-login-password)" >> $GITHUB_ENV

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # - name: Login to Docker Hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: AWS
    #     password: ${{ env.ecr_password }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        push: true
        file: ${{ inputs.docker_file }}
        tags:  ${{ env.image_url }}
        
    - name: output
      shell: bash
      run: |
        echo "image_link=${{ env.image_url }}" >> $GITHUB_OUTPUT
        echo "::endgroup::"
        echo "::notice::${{ env.image_url }}"

