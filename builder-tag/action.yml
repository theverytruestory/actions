name: "Generate builder image tag"
description: "Generates a stable tag for builder image based on hash of Dockerfile.builder and requirements"

inputs:
  dockerfile:
    description: "Path to builder Dockerfile"
    required: false
    default: "./Dockerfile.builder"
  requirements:
    description: "Path to requirements file (can be comma-separated list)"
    required: false
    default: "requirements.txt"
  registry:
    description: "Docker registry"
    required: false
    default: "registry.truestory.work"
  repo:
    description: "Repository name, if not set it will be taken from github event"
    required: false
    default: ""

outputs:
  tag:
    description: "Builder tag (e.g., builder-a1b2c3d4e5f6)"
    value: ${{ steps.generate.outputs.tag }}
  image:
    description: "Full builder image reference"
    value: ${{ steps.generate.outputs.image }}
  exists:
    description: "Whether builder image already exists (true/false)"
    value: ${{ steps.check.outputs.exists }}

runs:
  using: "composite"
  steps:
    - name: Generate builder tag
      id: generate
      shell: bash
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        REQUIREMENTS: ${{ inputs.requirements }}
        INPUT_REPO: ${{ inputs.repo }}
      run: |
        # Check if builder dockerfile exists
        if [ ! -f "$DOCKERFILE" ]; then
          echo "Builder dockerfile not found: $DOCKERFILE"
          echo "tag=" >> $GITHUB_OUTPUT
          echo "image=" >> $GITHUB_OUTPUT
          echo "exists=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Parse requirements files (comma-separated)
        REQ_FILES=$(echo "$REQUIREMENTS" | tr ',' ' ')

        # Check if all requirements files exist
        for req_file in $REQ_FILES; do
          if [ ! -f "$req_file" ]; then
            echo "Requirements file not found: $req_file"
            echo "tag=" >> $GITHUB_OUTPUT
            echo "image=" >> $GITHUB_OUTPUT
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 0
          fi
        done

        # Generate hash from dockerfile and requirements
        HASH=$(cat "$DOCKERFILE" $REQ_FILES | sha256sum | cut -d' ' -f1 | cut -c1-12)
        TAG="builder-${HASH}"

        # Determine repo name
        if [ -n "$INPUT_REPO" ]; then
          REPO_NAME="$INPUT_REPO"
        else
          REPO_NAME="${{ github.event.repository.name }}"
        fi

        IMAGE="${{ inputs.registry }}/${REPO_NAME}:${TAG}"

        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "image=${IMAGE}" >> $GITHUB_OUTPUT
        echo "Generated builder tag: ${TAG}"
        echo "Builder image: ${IMAGE}"

    - name: Check if builder exists
      id: check
      if: steps.generate.outputs.image != ''
      continue-on-error: true
      shell: bash
      run: |
        if docker manifest inspect ${{ steps.generate.outputs.image }} >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Builder image exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Builder image does not exist"
        fi