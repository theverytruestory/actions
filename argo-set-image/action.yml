name: "ArgoCD set image and commit"
description: "Test image via ArgoCD kustomize-image parameter, then commit to Git if stable"

inputs:
  registry:
    description: "Docker registry"
    required: false
    default: "registry.truestory.work"
  repo:
    description: "Repository name (without registry), if not set will use github.event.repository.name"
    required: false
    default: ""
  tag:
    description: "Docker image tag (should be passed from docker-build-upload)"
    required: true
  argoapp:
    description: "ArgoCD application name"
    required: false
    default: ""
  image_name:
    description: "Image name in kustomization.yaml (defaults to repo value)"
    required: false
    default: ""
  timeout:
    description: "Timeout for app stabilization (e.g., 120)"
    required: false
    default: "120"
  git_user_name:
    description: "Git user name for commit"
    required: false
    default: "github-actions[bot]"
  git_user_email:
    description: "Git user email for commit"
    required: false
    default: "github-actions[bot]@truestory.work"

outputs:
  status:
    description: "Deployment status (success or failed)"
    value: ${{ steps.result.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Set variables
      id: vars
      shell: bash
      run: |
        REPO_FULL="${{ inputs.registry }}/${{ inputs.repo || github.event.repository.name }}"
        ARGOAPP="${{ inputs.argoapp || github.event.repository.name }}"
        ARGOAPP="${ARGOAPP//_/-}"
        IMAGE_FULL="${REPO_FULL}:${{ inputs.tag }}"
        KUSTOMIZE="${ARGOAPP}/kustomization.yaml"

        echo "REPO_FULL=${REPO_FULL}" >> $GITHUB_ENV
        echo "IMAGE_FULL=${IMAGE_FULL}" >> $GITHUB_ENV
        echo "ARGOAPP=${ARGOAPP}" >> $GITHUB_ENV
        echo "KUSTOMIZE=${KUSTOMIZE}" >> $GITHUB_ENV

        echo "### Deploy \`${ARGOAPP}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`${IMAGE_FULL}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Checkout deployments
      uses: actions/checkout@v4
      with:
        ref: refs/heads/main
        show-progress: false
        repository: theverytruestory/deployments
        ssh-key: ~/.ssh/id_ed25519
        sparse-checkout: k0s/apps
        path: deployments
        fetch-depth: 1

    - name: Save current state
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        echo "Fetching current app state..."
        argocd --core app get ${{ env.ARGOAPP }} -o tree > /tmp/before.txt 2>&1 || true

    - name: Set image ${{ env.IMAGE_FULL }}
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        echo "Disabling auto-sync..."
        argocd --core app set ${{ env.ARGOAPP }} --sync-policy none

        echo "Setting image to ${{ env.IMAGE_FULL }}..."
        argocd --core app set ${{ env.ARGOAPP }} --kustomize-image="${{ env.IMAGE_FULL }}"

    - name: Wait for healthy (timeout ${{ inputs.timeout }}s)
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        echo "Waiting for app to become healthy..."
        echo "<details><summary>ArgoCD wait output</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        argocd --core app wait ${{ env.ARGOAPP }} --timeout ${{ inputs.timeout }} --health -o tree 2>&1 | tee -a $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Re-enable auto-sync
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        echo "Re-enabling auto-sync..."
        argocd --core app set ${{ env.ARGOAPP }} --sync-policy auto

    - name: Commit manifest update
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        set -e

        git config --global user.name "${{ inputs.git_user_name }}"
        git config --global user.email "${{ inputs.git_user_email }}"

        yq eval '(.images[] | select(.name == "${{ env.REPO_FULL }}") | .newTag) = "${{ inputs.tag }}"' -i ${{ env.KUSTOMIZE }}

        echo "<details><summary>Manifest diff</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```diff' >> $GITHUB_STEP_SUMMARY
        git diff -U0 >> $GITHUB_STEP_SUMMARY || true
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        git add ${{ env.KUSTOMIZE }}

        if git diff --cached --quiet; then
          echo "No changes to commit (tag already up to date)"
          echo "**Result:** No changes - tag already matches" >> $GITHUB_STEP_SUMMARY
        else
          msg='${{ github.actor }}@${{ github.event.repository.name }}#${{ github.run_number }}: ${{ github.event.head_commit.message }}'
          git commit -m "${msg}"
          git push origin main
          echo "**Result:** Committed and pushed manifest update" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Rollback on failure
      if: failure()
      working-directory: deployments/k0s/apps
      shell: bash
      run: |
        echo ""
        echo "### Deployment failed - rolling back" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "Unsetting image..."
        argocd --core app unset ${{ env.ARGOAPP }} --kustomize-image="${{ env.IMAGE_FULL }}" 2>&1 || true

        echo "Re-enabling auto-sync..."
        argocd --core app set ${{ env.ARGOAPP }} --sync-policy auto 2>&1 || true

        echo "Waiting for rollback..."
        echo "<details><summary>Rollback output</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        argocd --core app wait ${{ env.ARGOAPP }} --timeout ${{ inputs.timeout }} --health -o tree 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "<details><summary>State before deploy</summary>" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat /tmp/before.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No saved state" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "</details>" >> $GITHUB_STEP_SUMMARY
