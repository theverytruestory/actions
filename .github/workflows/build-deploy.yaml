name: "Build and Deploy"

on:
  workflow_call:
    inputs:
      docker_file:
        type: string
        default: "./Dockerfile"
      context:
        type: string
        default: "."
      version_file:
        type: string
        default: "version.json"
      repo:
        type: string
        default: ""
      builder_dockerfile:
        type: string
        default: "./Dockerfile.builder"
      builder_requirements:
        type: string
        default: "requirements.txt"
      builder_build_args:
        type: string
        default: ""
      deploy:
        type: boolean
        default: true
      argoapp:
        type: string
        default: ""
      timeout:
        type: string
        default: "120"
      test:
        type: string
        default: ""
      runs-on:
        type: string
        default: "htz-k0s"
    outputs:
      TAG:
        value: ${{ jobs.build.outputs.TAG }}
      REPO:
        value: ${{ jobs.build.outputs.REPO }}

jobs:

  build:
    runs-on: ${{ inputs.runs-on }}
    name: "build ${{ github.head_ref || github.ref_name }}"
    outputs:
      TAG: ${{ steps.build-upload.outputs.TAG }}
      REPO: ${{ steps.build-upload.outputs.REPO }}

    steps:

      - uses: actions/checkout@v7

      - name: Generate builder tag
        id: builder
        uses: theverytruestory/actions/builder-tag@main
        with:
          dockerfile: ${{ inputs.builder_dockerfile }}
          requirements: ${{ inputs.builder_requirements }}
          repo: ${{ inputs.repo }}

      - uses: theverytruestory/actions/docker-build-upload@main
        id: build-upload
        with:
          docker_file: ${{ inputs.docker_file }}
          context: ${{ inputs.context }}
          version_file: ${{ inputs.version_file }}
          repo: ${{ inputs.repo }}
          builder_image: ${{ steps.builder.outputs.image }}
          builder_dockerfile: ${{ inputs.builder_dockerfile }}
          builder_build_args: ${{ inputs.builder_build_args }}

  test:
    if: inputs.test != ''
    needs: build
    runs-on: ${{ inputs.runs-on }}
    name: "test"
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x ${{ inputs.test }} && ./${{ inputs.test }}

  deploy:
    # !cancelled() отменяет авто-skip, когда test пропущен (inputs.test == '');
    # без status-функции пропуск test пропагируется на deploy.
    if: ${{ !cancelled() && inputs.deploy && needs.build.result == 'success' }}
    runs-on: ${{ inputs.runs-on }}
    needs: [build, test]
    name: "deploy ${{ needs.build.outputs.TAG }}"

    steps:

      - uses: theverytruestory/actions/argo-set-image@main
        with:
          tag: ${{ needs.build.outputs.TAG }}
          repo: ${{ inputs.repo }}
          argoapp: ${{ inputs.argoapp }}
          timeout: ${{ inputs.timeout }}
